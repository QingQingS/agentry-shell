<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Shell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e2535;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    #agent-badge {
      font-size: 0.75rem;
      background: #1e3a5f;
      color: #60a5fa;
      padding: 3px 10px;
      border-radius: 999px;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #374151;
      margin-left: auto;
      transition: background 0.3s;
    }
    #status-dot.running  { background: #f59e0b; animation: pulse 1s infinite; }
    #status-dot.done     { background: #10b981; }
    #status-dot.error    { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Log panel ── */
    #log-panel {
      border-right: 1px solid #1e2535;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #log-panel h2 {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #64748b;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #1e2535;
    }
    #log-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .log-item { color: #94a3b8; }
    .log-item.error { color: #f87171; }
    .log-item::before { content: "› "; color: #334155; }

    /* 每轮日志分组 */
    .log-group + .log-group { margin-top: 14px; padding-top: 12px; border-top: 1px dashed #1e2535; }
    .log-group-head {
      color: #cbd5e1;
      font-weight: 600;
      font-size: 0.8rem;
      margin-bottom: 6px;
      word-break: break-word;
    }

    /* ── Result panel ── */
    #result-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #result-panel h2 {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #64748b;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #1e2535;
    }
    #result-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 0.9rem;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #cbd5e1;
    }
    #result-content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
      font-size: 0.85rem;
    }

    /* 每轮结果块（多轮累积，session 内保留） */
    .turn-block { padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid #1e2535; }
    .turn-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .turn-q {
      color: #60a5fa;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .turn-a { white-space: pre-wrap; color: #cbd5e1; }
    .turn-a.pending { color: #475569; }

    /* ── Footer / Input ── */
    footer {
      padding: 16px 24px;
      border-top: 1px solid #1e2535;
      display: flex;
      gap: 10px;
    }
    #task-input {
      flex: 1;
      background: #1e2535;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 16px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #task-input:focus { border-color: #3b82f6; }
    #task-input::placeholder { color: #475569; }

    #run-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    #run-btn:hover { background: #1d4ed8; }
    #run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-btn {
      background: transparent;
      color: #475569;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    #clear-btn:hover { color: #94a3b8; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Agent Shell</h1>
  <span id="agent-badge">loading...</span>
  <div id="status-dot" title="状态"></div>
</header>

<main>
  <section id="log-panel">
    <h2>过程日志</h2>
    <div id="log-list"></div>
  </section>

  <section id="result-panel">
    <h2>结果输出</h2>
    <div id="result-content" class="empty">结果将在这里显示…</div>
  </section>
</main>

<footer>
  <input id="task-input" type="text" placeholder="输入任务，按 Enter 或点击运行…" />
  <button id="clear-btn" onclick="clearAll()">清空</button>
  <button id="run-btn" onclick="runTask()">运行</button>
</footer>

<script src="/static/scripts.js"></script>
</body>
</html>
